<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carte Biomes — Monde</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <header class="hero">
        <h1>Carte des zones</h1>
        <p>
          Une composition douce et organique inspirée d'une nature rêvée:
          minérale, végétale et brumeuse.
        </p>
      </header>

      <section class="map-grid" aria-label="Carte des biomes">
        <article class="tile tile-sous-bois">Sous bois</article>
        <article class="tile tile-chemins">Chemins</article>
        <article class="tile tile-tundra">Tundra</article>
        <article class="tile tile-plaines">Plaines</article>
        <article class="tile tile-simulation">Simulation</article>
        <article class="tile tile-bois">Bois</article>
        <article class="tile tile-lacs">Lacs / Étangs</article>
        <article class="tile tile-ruines">Ruines</article>
        <article class="tile tile-marecages">Marécages</article>
        <article class="tile tile-falaises">Falaises</article>
        <article class="tile tile-interieurs">Intérieurs</article>
        <article class="tile tile-bois-profonds">Bois profonds</article>
        <article class="tile tile-rivieres">Rivières</article>
        <article class="tile tile-montagnes">Montagnes</article>
      </section>
    </main>
  </body>
</html>
